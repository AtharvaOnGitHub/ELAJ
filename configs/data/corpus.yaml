vocabulary_path: data/processed/vocabulary.json

# Studies are loaded from a CSV generated by the preprocessing pipeline.
# See docs/corpus_csv_spec.md for the required column format.
# Inline studies list below is used only for quick testing without a CSV.
studies_csv: data/processed/studies.csv

splits:
  strategy: patient_held_out   # all cells from a patient go into one split
  val_fraction: 0.15
  test_fraction: 0.15
  seed: 24

dns_sentinel: -1
max_cells_per_study: null      # null = use all; integer = cap for debugging
